name: Run Python Tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Set up Python 3.8
        uses: action/setup-python@v2
        with:
          python-version: 3.8
      - name: run Tests
        run: |
          python -m unittest test_main.py -v

name: Run Python Test

on:
  push:
      branches: [ main ]


jobs:
  tests:
    runs-on: ubuntu-latest

    steps: 
    - uses: actions/checkout@v2
    - name: Set up Python 3.8 
      uses: actions/setup-python@v2
      with:
        python-version: 3.8
    - name: Run tests
      run: 
        python -m unittest test_main.py -v

    
